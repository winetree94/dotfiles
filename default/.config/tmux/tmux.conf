# -- Terminal & Colors --
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# -- Critical Neovim Settings --
set -sg escape-time 10
set -g focus-events on

# -- Clipboard (OSC 52, works over SSH) --
set -s set-clipboard on
set -g allow-passthrough on
set -as terminal-features ",tmux-256color:clipboard"

# -- General --
set -g mouse on
set-window-option -g mode-keys vi
set-option -g renumber-windows on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 50000

# -- Status Bar / Tabs --
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#111827,fg=#94a3b8"
set -g status-left-length 16
set -g status-right-length 24
set -g status-left "#[fg=#60a5fa,bold] #S "
set -g status-right "#[fg=#94a3b8]%a %H:%M "
set -g window-status-separator ""
set -g window-status-format "#[fg=#94a3b8,bg=#1f2937] #I:#W "
set -g window-status-current-format "#[fg=#0f172a,bg=#60a5fa,bold] #I:#W "
set -g window-status-activity-style "fg=#fbbf24,bg=#1f2937,bold"
set -g window-status-bell-style "fg=#f8fafc,bg=#ef4444,bold"

# -- Keybindings --
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Alt+h/l to switch windows (tabs)
bind -n M-h previous-window
bind -n M-l next-window

# Alt+j/k to switch panes
bind -n M-j select-pane -t :.+
bind -n M-k select-pane -t :.-

# Change prefix key
unbind C-b
set -g prefix C-g
bind C-g send-prefix

# vi-style copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g extended-keys-format csi-u
